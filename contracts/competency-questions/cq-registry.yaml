      - customer
      - name
      - orderCount
    status: planned

  - id: CQ-005
    title: Store daily revenue
    question: "What is daily revenue per store?"
    rationale: "Supports operational and financial reporting by location/day."
    query_template: null
    expected_variables:
      - storeName
      - orderDate
      - dailyRevenue
